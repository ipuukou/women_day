<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三八女神节快乐 - 徐丹丹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #ffe4ec 0%, #fff0f5 50%, #fff5ee 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* 粒子画布 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 顶部花边 */
        .garland-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 3;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            font-size: 1.1rem;
        }

        .garland-top span {
            animation: garlandFlow 3s ease-in-out infinite;
            opacity: 0;
        }

        .garland-top span:nth-child(1) { animation-delay: 0s; }
        .garland-top span:nth-child(2) { animation-delay: 0.2s; }
        .garland-top span:nth-child(3) { animation-delay: 0.4s; }
        .garland-top span:nth-child(4) { animation-delay: 0.6s; }
        .garland-top span:nth-child(5) { animation-delay: 0.8s; }
        .garland-top span:nth-child(6) { animation-delay: 1s; }

        @keyframes garlandFlow {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 15px 100px;
        }

        /* 祝福卡片 - 更小 */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px 18px;
            max-width: 100%;
            width: 100%;
            text-align: center;
            border: 2px solid rgba(255, 107, 157, 0.2);
            box-shadow: 0 12px 35px rgba(255, 107, 157, 0.12);
            margin-bottom: 15px;
        }

        /* 标题 */
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b9d, #ff8fab, #ffc3d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 0.85rem;
            color: #ff8fab;
            margin-bottom: 15px;
        }

        /* 收件人 */
        .to {
            font-size: 0.8rem;
            color: #e85a7a;
            margin-bottom: 8px;
        }

        .recipient {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        /* 祝福语 */
        .message {
            font-size: 0.85rem;
            line-height: 1.8;
            color: #5a5a6e;
        }

        .message p {
            margin-bottom: 6px;
        }

        /* 签名 */
        .signature {
            font-size: 0.75rem;
            color: #ff8fab;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 107, 157, 0.2);
        }

        /* 照片区域 - 位置上移 */
        .photo-section {
            width: 100%;
            margin-top: 10px;
            padding: 0;
            flex-shrink: 0;
        }

        .photo-title {
            font-size: 0.8rem;
            color: #ff8fab;
            text-align: center;
            margin-bottom: 10px;
        }

        /* 自动滑动照片容器 */
        .photo-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 5px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            animation: autoSlide 20s linear infinite;
        }

        .photo-scroll::-webkit-scrollbar {
            display: none;
        }

        @keyframes autoSlide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .photo-item {
            flex-shrink: 0;
            width: 140px;
            height: 185px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 底部花边 */
        .garland-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 3;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            font-size: 1.1rem;
        }

        .garland-bottom span {
            animation: garlandFlow 3s ease-in-out infinite;
            opacity: 0;
        }

        .garland-bottom span:nth-child(1) { animation-delay: 0.5s; }
        .garland-bottom span:nth-child(2) { animation-delay: 0.7s; }
        .garland-bottom span:nth-child(3) { animation-delay: 0.9s; }
        .garland-bottom span:nth-child(4) { animation-delay: 1.1s; }
        .garland-bottom span:nth-child(5) { animation-delay: 1.3s; }
        .garland-bottom span:nth-child(6) { animation-delay: 1.5s; }

        /* 花朵装饰 */
        .flowers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .flower {
            position: absolute;
            font-size: 1.3rem;
            animation: fall linear infinite;
            opacity: 0.5;
        }

        @keyframes fall {
            0% {
                transform: translateY(-80px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            bottom: 70px;
            right: 15px;
            z-index: 100;
            width: 40px;
            height: 40px;
            background: rgba(255, 107, 157, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(255, 107, 157, 0.4);
        }

        .music-control .icon {
            font-size: 1.1rem;
        }

        .music-control.playing .icon {
            animation: musicBeat 1s ease-in-out infinite;
        }

        @keyframes musicBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 开始覆盖层 */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 228, 236, 0.98);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .start-overlay.hidden {
            display: none;
        }

        .start-content {
            text-align: center;
            padding: 25px;
        }

        .start-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .start-content h2 {
            font-size: 1.3rem;
            color: #ff6b9d;
            margin-bottom: 8px;
        }

        .start-content p {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }

        .start-btn {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            border-radius: 22px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="新月.mp3" type="audio/mpeg">
    </audio>

    <!-- 开始覆盖层 -->
    <div class="start-overlay" id="startOverlay">
        <div class="start-content">
            <div class="start-icon">🎵</div>
            <h2>点击开启音乐</h2>
            <p>为徐丹丹准备的惊喜</p>
            <button class="start-btn" id="startBtn">🎶 播放音乐</button>
        </div>
    </div>

    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicControl">
        <span class="icon" id="musicIcon">🎵</span>
    </div>

    <!-- 粒子画布 -->
    <canvas id="particles"></canvas>

    <!-- 顶部花边 -->
    <div class="garland-top">
        <span>🌸</span>
        <span>🌺</span>
        <span>🌷</span>
        <span>🌹</span>
        <span>💐</span>
        <span>💗</span>
    </div>

    <!-- 花朵背景 -->
    <div class="flowers" id="flowers"></div>

    <!-- 主内容 -->
    <div class="container">
        <div class="card">
            <h1 class="title">三八女神节快乐</h1>
            <p class="subtitle">Women's Day</p>
            <div class="to">致</div>
            <div class="recipient">徐丹丹</div>
            <div class="message">
                <p>🌸 亲爱的丹丹女神 🌸</p>
                <p>在这个特别的日子里，愿你</p>
                <p>✨ 永远年轻美丽 ✨</p>
                <p>✨ 永远自信闪耀 ✨</p>
                <p>✨ 永远被温柔以待 ✨</p>
                <p>你是最独特的存在</p>
                <p>愿所有的美好都属于你</p>
            </div>
            <div class="signature">—— 永远的女神 ——</div>
        </div>

        <!-- 照片区域 - 位置上移 -->
        <div class="photo-section">
            <div class="photo-title">📸 美好瞬间</div>
            <div class="photo-scroll">
                <!-- 照片重复两遍实现无缝循环 -->
                <div class="photo-item"><img src="1.jpg" alt="照片1"></div>
                <div class="photo-item"><img src="2.jpg" alt="照片2"></div>
                <div class="photo-item"><img src="3.jpg" alt="照片3"></div>
                <div class="photo-item"><img src="4.jpg" alt="照片4"></div>
                <div class="photo-item"><img src="5.jpg" alt="照片5"></div>
                <div class="photo-item"><img src="6.jpg" alt="照片6"></div>
                <div class="photo-item"><img src="1.jpg" alt="照片1"></div>
                <div class="photo-item"><img src="2.jpg" alt="照片2"></div>
                <div class="photo-item"><img src="3.jpg" alt="照片3"></div>
                <div class="photo-item"><img src="4.jpg" alt="照片4"></div>
                <div class="photo-item"><img src="5.jpg" alt="照片5"></div>
                <div class="photo-item"><img src="6.jpg" alt="照片6"></div>
            </div>
        </div>
    </div>

    <!-- 底部花边 -->
    <div class="garland-bottom">
        <span>🌹</span>
        <span>💗</span>
        <span>🌸</span>
        <span>🌺</span>
        <span>🌷</span>
        <span>💐</span>
    </div>

    <script>
        // 背景音乐控制
        const bgMusic = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');
        let isPlaying = false;

        bgMusic.volume = 0.5;

        startBtn.addEventListener('click', () => {
            bgMusic.play()
                .then(() => {
                    isPlaying = true;
                    musicControl.classList.add('playing');
                    musicIcon.textContent = '🎵';
                    startOverlay.classList.add('hidden');
                })
                .catch((error) => {
                    console.log('播放失败:', error);
                });
        });

        musicControl.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                isPlaying = false;
                musicControl.classList.remove('playing');
                musicIcon.textContent = '🔇';
            } else {
                bgMusic.play()
                    .then(() => {
                        isPlaying = true;
                        musicControl.classList.add('playing');
                        musicIcon.textContent = '🎵';
                    })
                    .catch((error) => {
                        console.log('播放失败:', error);
                    });
            }
        });

        // 粒子动画
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 35;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.8;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.color = `hsl(${Math.random() * 30 + 330}, 100%, 80%)`;
                this.opacity = Math.random() * 0.25 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        // 花朵动画
        const flowers = ['🌸', '🌺', '🌷', '🌹', '💐', '💗'];
        const flowersContainer = document.getElementById('flowers');

        function createFlower() {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + '%';
            flower.style.animationDuration = (Math.random() * 4 + 7) + 's';
            flowersContainer.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 12000);
        }

        for (let i = 0; i < 4; i++) {
            setTimeout(createFlower, i * 400);
        }

        setInterval(createFlower, 2500);

        // 窗口大小调整
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
